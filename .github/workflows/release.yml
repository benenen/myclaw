name: Release

on:
  push:
    tags: ["v*"]

jobs:
  binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o myclaw-${{ matrix.goos }}-${{ matrix.goarch }} .
          sha256sum myclaw-${{ matrix.goos }}-${{ matrix.goarch }} > myclaw-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: myclaw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            myclaw-${{ matrix.goos }}-${{ matrix.goarch }}
            myclaw-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  docker:
    runs-on: ubuntu-latest
    needs: binaries
    permissions:
      packages: write
    strategy:
      matrix:
        variant:
          - { target: runtime-base,     suffix: "" }
          - { target: myclaw-codex,     suffix: "-codex" }
          - { target: myclaw-opencode,  suffix: "-opencode" }
          - { target: myclaw-cc,        suffix: "-cc" }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}${{ matrix.variant.suffix }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.variant.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    runs-on: ubuntu-latest
    needs: binaries
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: myclaw-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: myclaw-*
          generate_release_notes: true
