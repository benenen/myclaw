name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Test
        run: go test ./...

      - name: Build
        run: go build .

  docker:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        variant:
          - { target: runtime-base,     suffix: "" }
          - { target: myclaw-codex,     suffix: "-codex" }
          - { target: myclaw-opencode,  suffix: "-opencode" }
          - { target: myclaw-cc,        suffix: "-cc" }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.variant.target }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: ${{ matrix.variant.target }}
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
