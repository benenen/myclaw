<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myclaw Bots</title>
<style>
:root {
  --bg: #f5f7fb;
  --panel: #ffffff;
  --panel-soft: #f8fafc;
  --line: #e6ebf2;
  --text: #0f172a;
  --muted: #64748b;
  --accent: #2563eb;
  --accent-soft: #dbeafe;
  --success: #16a34a;
  --warning: #d97706;
  --danger: #dc2626;
  --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
  --radius: 20px;
  --radius-sm: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: linear-gradient(180deg, #f8fafc 0%, #f3f6fb 100%);
  color: var(--text);
  font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.shell {
  width: min(1280px, calc(100vw - 32px));
  margin: 20px auto;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 20px;
  border: 1px solid var(--line);
  border-radius: 24px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(18px);
  box-shadow: var(--shadow);
}
.brand {
  display: grid;
  gap: 4px;
}
.brand small {
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.brand h1 {
  font-size: 20px;
  font-weight: 650;
  letter-spacing: -0.03em;
}
.toolbar {
  display: flex;
  gap: 10px;
  align-items: center;
}
.user-pill {
  min-width: 44px;
  height: 44px;
  padding: 0 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  color: var(--muted);
}
.user-pill svg {
  width: 18px;
  height: 18px;
}
.toolbar input,
.toolbar select,
input,
select,
button {
  appearance: none;
  -webkit-appearance: none;
  -moz-appearance: none;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  color: var(--text);
  padding: 11px 13px;
  font: inherit;
  outline: none;
}
.icon-btn {
  width: 34px;
  height: 34px;
  padding: 0;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  line-height: 1;
}
.icon-btn svg {
  width: 16px;
  height: 16px;
}
select {
  padding-right: 38px;
  background-image: linear-gradient(45deg, transparent 50%, #64748b 50%), linear-gradient(135deg, #64748b 50%, transparent 50%);
  background-position: calc(100% - 18px) calc(50% - 3px), calc(100% - 12px) calc(50% - 3px);
  background-size: 6px 6px, 6px 6px;
  background-repeat: no-repeat;
}
select option {
  color: var(--text);
  background: #fff;
}
input:focus,
select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.08);
}
button {
  cursor: pointer;
  font-weight: 600;
}
button:hover { transform: translateY(-1px); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.btn-secondary {
  background: var(--panel-soft);
}
.btn-danger {
  background: #fff1f2;
  border-color: #fecdd3;
  color: var(--danger);
}
.layout {
  margin-top: 18px;
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 18px;
}
.sidebar,
.workspace {
  background: rgba(255,255,255,0.84);
  border: 1px solid var(--line);
  border-radius: 24px;
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}
.sidebar {
  padding: 18px;
  display: grid;
  gap: 14px;
  align-self: start;
  position: sticky;
  top: 20px;
}
.workspace {
  padding: 18px;
  display: grid;
  gap: 16px;
}
.section-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.section-title h2 {
  font-size: 15px;
  font-weight: 650;
}
.section-title span {
  color: var(--muted);
  font-size: 12px;
}
.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.list-title {
  display: flex;
  align-items: center;
  gap: 8px;
}
.icon-btn {
  width: 34px;
  height: 34px;
  padding: 0;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  line-height: 1;
}
.modal .form-grid {
  margin-top: 12px;
}
.modal .field,
.modal .field.wide,
.modal .field.action {
  grid-column: span 12;
}
.modal .field.action {
  display: flex;
  justify-content: flex-end;
}
.modal .field.action button {
  width: auto;
}
.qr-box + .qr-box {
  margin-top: 10px;
}
.bot-list {
  display: grid;
  gap: 10px;
}
.bot-item {
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
  cursor: pointer;
  transition: .18s ease;
}
.bot-item:hover {
  border-color: #cbd5e1;
  transform: translateY(-1px);
}
.bot-item.active {
  border-color: #bfdbfe;
  background: #f8fbff;
  box-shadow: inset 0 0 0 1px #dbeafe;
}
.bot-item strong {
  font-size: 14px;
  font-weight: 650;
}
.bot-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 6px;
}
.bot-delete {
  width: 30px;
  height: 30px;
  border-radius: 10px;
  color: var(--danger);
  border-color: transparent;
  background: #fff1f2;
  flex: none;
}
.bot-delete:hover {
  border-color: #fecdd3;
}
.bot-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  color: var(--muted);
  font-size: 12px;
}
.card {
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 18px;
}
.card h3 {
  font-size: 14px;
  font-weight: 650;
  margin-bottom: 12px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.mini {
  padding: 14px;
  border-radius: 16px;
  background: var(--panel-soft);
  border: 1px solid var(--line);
}
.mini span {
  display: block;
  color: var(--muted);
  font-size: 11px;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.mini strong {
  display: block;
  font-size: 14px;
}
.form-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 12px;
}
.field {
  grid-column: span 4;
  display: grid;
  gap: 8px;
}
.field.wide { grid-column: span 5; }
.field.action { grid-column: span 3; align-content: end; }
.field label {
  color: var(--muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.empty {
  padding: 28px 18px;
  border: 1px dashed #cbd5e1;
  border-radius: 18px;
  text-align: center;
  color: var(--muted);
  background: #fff;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
}
.badge::before {
  content: "";
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: currentColor;
}
.badge-neutral { background: #eef2f7; color: #64748b; }
.badge-info { background: #e0f2fe; color: #0284c7; }
.badge-success { background: #dcfce7; color: var(--success); }
.badge-warning { background: #fef3c7; color: var(--warning); }
.badge-danger { background: #fee2e2; color: var(--danger); }
.kv {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 10px;
  font-size: 13px;
}
.kv + .kv { margin-top: 10px; }
.kv span { color: var(--muted); }
pre {
  margin-top: 12px;
  padding: 14px;
  border-radius: 16px;
  background: #0f172a;
  color: #e2e8f0;
  overflow: auto;
  font-size: 12px;
}
.toast {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 1000;
  padding: 12px 14px;
  border-radius: 14px;
  background: #111827;
  color: #fff;
  box-shadow: var(--shadow);
}
.modal-overlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(15, 23, 42, 0.38);
  backdrop-filter: blur(8px);
  z-index: 999;
}
.modal-overlay.active { display: flex; }
.modal {
  width: min(560px, calc(100vw - 24px));
  background: #fff;
  border-radius: 24px;
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  padding: 20px;
}
.modal h3 {
  font-size: 16px;
  margin-bottom: 10px;
}
.modal p {
  color: var(--muted);
  margin-bottom: 14px;
}
.qr-box {
  padding: 16px;
  border-radius: 18px;
  background: var(--panel-soft);
  border: 1px solid var(--line);
  word-break: break-all;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
}
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 16px;
}
@media (max-width: 980px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: static; }
  .grid { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .field, .field.wide, .field.action { grid-column: auto; }
  .topbar { flex-direction: column; align-items: stretch; }
  .toolbar { flex-direction: column; }
}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <small>myclaw</small>
      <h1>Bots</h1>
    </div>
    <div class="toolbar">
      <div class="user-pill" title="u_123" aria-label="Current user">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"/>
          <circle cx="12" cy="8" r="4"/>
        </svg>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="list-header">
        <div class="list-title">
          <h2>Bot List</h2>
          <span id="bot-count">(count: 0)</span>
        </div>
        <div class="toolbar">
          <button class="btn-secondary icon-btn" onclick="loadBots()" title="Refresh" aria-label="Refresh">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
              <path d="M21 3v6h-6"/>
            </svg>
          </button>
          <button class="btn-secondary icon-btn" onclick="openCreateBotModal()" title="New Bot">+</button>
        </div>
      </div>

      <div id="bot-list" class="bot-list"></div>
      <div id="bot-empty" class="empty">No bots</div>
    </aside>

    <main class="workspace">
      <div id="workspace-empty" class="empty">Select a bot</div>

      <div id="workspace-detail" style="display:none; gap:16px;">
        <div class="card">
          <div class="section-title">
            <h2 id="detail-name">-</h2>
            <span id="detail-status-badge"></span>
          </div>
          <div class="grid">
            <div class="mini">
              <span>Channel</span>
              <strong id="detail-channel">-</strong>
            </div>
            <div class="mini">
              <span>Bot ID</span>
              <strong id="detail-bot-id">-</strong>
            </div>
            <div class="mini">
              <span>Account</span>
              <strong id="detail-account-id">-</strong>
            </div>
          </div>
        </div>

        <div class="card">
          <h3>Agent</h3>
          <div class="form-grid">
            <div class="field wide">
              <label>Capability</label>
              <select id="detail-agent-capability"></select>
            </div>
            <div class="field wide">
              <label>Mode</label>
              <select id="detail-agent-mode"></select>
            </div>
            <div class="field action">
              <button class="btn-secondary" onclick="saveSelectedBotAgent()">Save</button>
            </div>
          </div>
        </div>

        <div class="card">
          <h3>Connect</h3>
          <button class="btn-primary" onclick="connectSelectedBot()">Login / Connect</button>
          <div id="connect-result"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="create-bot-modal">
  <div class="modal">
    <h3>New Bot</h3>
    <div class="form-grid">
      <div class="field wide">
        <label>Name</label>
        <input id="create-bot-name" type="text" placeholder="sales-bot">
      </div>
      <div class="field wide">
        <label>Channel</label>
        <select id="create-bot-channel">
          <option value="wechat">wechat</option>
        </select>
      </div>
      <div class="field wide">
        <label>Capability</label>
        <select id="create-bot-capability"></select>
      </div>
      <div class="field wide">
        <label>Mode</label>
        <select id="create-bot-mode"></select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeCreateBotModal()">Close</button>
      <button class="btn-primary" onclick="createBot()">Create</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="qr-modal">
  <div class="modal">
    <h3>QR Login</h3>
    <p id="qr-status-text">Scan with WeChat</p>
    <div class="qr-box"><img id="qr-image" alt="WeChat QR code" style="display:none;max-width:100%;border-radius:12px;"/></div>
    <div class="qr-box" id="qr-share-box" style="display:none;">
      <div class="kv"><span>share</span><strong><a id="qr-share-link" target="_blank" rel="noreferrer"></a></strong></div>
      <div class="modal-actions" style="justify-content:flex-start;margin-top:10px;">
        <button class="btn-secondary" onclick="copyShareURL()">Copy Link</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" onclick="closeQRModal()">Close</button>
    </div>
  </div>
</div>

<script>
const API = '/api/v1';
let bots = [];
let agentCapabilities = [];
let selectedBotId = '';
let loginPollTimer = null;
let activeBindingId = '';

async function loadAgentCapabilities() {
  const data = await api('GET', '/agent-capabilities');
  if (data.code !== 'OK') {
    toast(data.message || data.code);
    return;
  }
  agentCapabilities = data.data || [];
  renderCapabilityOptions('create-bot-capability', 'create-bot-mode');
  renderSelectedBotAgentControls();
}

function renderCapabilityOptions(capabilitySelectId, modeSelectId, selectedCapabilityId, selectedMode) {
  const capabilitySelect = document.getElementById(capabilitySelectId);
  const modeSelect = document.getElementById(modeSelectId);
  if (!capabilitySelect || !modeSelect) {
    return;
  }
  capabilitySelect.innerHTML = '<option value="">Default</option>' + agentCapabilities.map(item => `<option value="${escapeHtml(item.id)}">${escapeHtml(item.label || item.key)}</option>`).join('');
  capabilitySelect.value = selectedCapabilityId || '';
  syncModeOptions(capabilitySelectId, modeSelectId, selectedMode);
}

function syncModeOptions(capabilitySelectId, modeSelectId, selectedMode) {
  const capabilitySelect = document.getElementById(capabilitySelectId);
  const modeSelect = document.getElementById(modeSelectId);
  if (!capabilitySelect || !modeSelect) {
    return;
  }
  const capability = agentCapabilities.find(item => item.id === capabilitySelect.value);
  const modes = capability?.supported_modes || [];
  modeSelect.innerHTML = '<option value="">Default</option>' + modes.map(mode => `<option value="${escapeHtml(mode)}">${escapeHtml(mode)}</option>`).join('');
  const nextMode = modes.includes(selectedMode) ? selectedMode : '';
  modeSelect.value = nextMode;
}

function selectedBot() {
  return bots.find(b => b.bot_id === selectedBotId);
}

function renderSelectedBotAgentControls() {
  const bot = selectedBot();
  renderCapabilityOptions('detail-agent-capability', 'detail-agent-mode', bot?.agent_capability_id || '', bot?.agent_mode || '');
}

async function saveSelectedBotAgent() {
  const bot = selectedBot();
  if (!bot) {
    toast('select a bot');
    return;
  }
  const agentCapabilityID = document.getElementById('detail-agent-capability').value;
  const agentMode = document.getElementById('detail-agent-mode').value;
  if (!agentCapabilityID || !agentMode) {
    toast('capability and mode required');
    return;
  }
  const data = await api('POST', '/bots/agent', {
    bot_id: bot.bot_id,
    agent_capability_id: agentCapabilityID,
    agent_mode: agentMode,
  });
  if (data.code !== 'OK') {
    toast(data.message || data.code);
    return;
  }
  const updated = data.data;
  bot.agent_capability_id = updated.agent_capability_id;
  bot.agent_mode = updated.agent_mode;
  renderSelectedBotAgentControls();
  renderBotList();
  renderDetail();
  toast('agent updated');
}

window.saveSelectedBotAgent = saveSelectedBotAgent;

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('create-bot-capability').addEventListener('change', () => syncModeOptions('create-bot-capability', 'create-bot-mode', ''));
  document.getElementById('detail-agent-capability').addEventListener('change', () => syncModeOptions('detail-agent-capability', 'detail-agent-mode', ''));
});

function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
}

function statusBadge(status) {
  const map = {
    login_required: 'warning',
    connecting: 'info',
    connected: 'success',
    error: 'danger',
    qr_ready: 'info',
    pending: 'neutral',
    confirmed: 'success',
    failed: 'danger',
    expired: 'warning'
  };
  return `<span class="badge badge-${map[status] || 'neutral'}">${status}</span>`;
}

async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(API + path, opts);
  return res.json();
}

function currentUserId() {
  return 'u_123';
}

function openCreateBotModal() {
  document.getElementById('create-bot-modal').classList.add('active');
}

function closeCreateBotModal() {
  document.getElementById('create-bot-modal').classList.remove('active');
}

async function createBot() {
  const userId = currentUserId();
  const name = document.getElementById('create-bot-name').value.trim();
  const channelType = document.getElementById('create-bot-channel').value;
  const agentCapabilityID = document.getElementById('create-bot-capability').value;
  const agentMode = document.getElementById('create-bot-mode').value;
  if (!userId || !name) {
    toast('user_id and name required');
    return;
  }
  const data = await api('POST', '/bots/create', {
    user_id: userId,
    name,
    channel_type: channelType,
    agent_capability_id: agentCapabilityID,
    agent_mode: agentMode,
  });
  if (data.code !== 'OK') {
    toast(data.message || data.code);
    return;
  }
  document.getElementById('create-bot-name').value = '';
  document.getElementById('create-bot-capability').value = '';
  document.getElementById('create-bot-mode').innerHTML = '<option value="">Default</option>';
  closeCreateBotModal();
  await loadBots(data.data.bot_id);
}

window.openCreateBotModal = openCreateBotModal;
window.closeCreateBotModal = closeCreateBotModal;

async function loadBots(preferBotId) {
  const userId = currentUserId();
  if (!userId) {
    toast('user_id required');
    return;
  }
  const data = await api('GET', '/bots/list?user_id=' + encodeURIComponent(userId));
  if (data.code !== 'OK') {
    toast(data.message || data.code);
    return;
  }
  bots = data.data || [];
  if (preferBotId) {
    selectedBotId = preferBotId;
  } else if (!bots.some(b => b.bot_id === selectedBotId)) {
    selectedBotId = bots[0]?.bot_id || '';
  }
  renderBotList();
  document.getElementById('bot-count').textContent = `(count: ${bots.length})`;
  renderDetail();
}

function renderBotList() {
  const list = document.getElementById('bot-list');
  const empty = document.getElementById('bot-empty');
  if (!bots.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = bots.map(bot => `
    <div class="bot-item ${bot.bot_id === selectedBotId ? 'active' : ''}" onclick="selectBot('${bot.bot_id}')">
      <div class="bot-head">
        <strong>${escapeHtml(bot.name)}</strong>
        <button class="icon-btn bot-delete" type="button" title="Delete bot" aria-label="Delete bot" onclick="event.stopPropagation(); deleteBot('${bot.bot_id}', '${escapeJs(bot.name)}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 6h18"/>
            <path d="M8 6V4h8v2"/>
            <path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6"/>
            <path d="M14 11v6"/>
          </svg>
        </button>
      </div>
      <div class="bot-meta">
        <span>${escapeHtml(bot.channel_type)}</span>
        <span>${statusBadge(bot.connection_status)}</span>
      </div>
    </div>
  `).join('');
}

function selectBot(botId) {
  selectedBotId = botId;
  renderBotList();
  renderDetail();
}

function renderDetail() {
  const empty = document.getElementById('workspace-empty');
  const detail = document.getElementById('workspace-detail');
  const bot = bots.find(b => b.bot_id === selectedBotId);
  if (!bot) {
    stopLoginPolling();
    empty.style.display = 'block';
    detail.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  detail.style.display = 'grid';
  document.getElementById('detail-name').textContent = bot.name;
  document.getElementById('detail-status-badge').innerHTML = statusBadge(bot.connection_status);
  document.getElementById('detail-channel').textContent = bot.channel_type;
  document.getElementById('detail-bot-id').textContent = bot.bot_id;
  document.getElementById('detail-account-id').textContent = bot.channel_account_id || '-';
  renderSelectedBotAgentControls();
  if (!activeBindingId) {
    document.getElementById('connect-result').innerHTML = '';
  }
}

function stopLoginPolling() {
  if (loginPollTimer) {
    clearTimeout(loginPollTimer);
    loginPollTimer = null;
  }
  activeBindingId = '';
}

function updateBotFromRefresh(result) {
  const bot = bots.find(item => item.bot_id === result.bot_id);
  if (!bot) {
    return;
  }
  bot.connection_status = result.connection_status;
  bot.channel_account_id = result.channel_account_id || '';
  renderBotList();
  renderDetail();
}

async function pollLogin(bindingID) {
  const data = await api('GET', '/bots/connect?binding_id=' + encodeURIComponent(bindingID));
  if (data.code !== 'OK') {
    stopLoginPolling();
    toast(data.message || data.code);
    return;
  }
  const result = data.data;
  activeBindingId = result.binding_id;
  document.getElementById('connect-result').innerHTML = '';
  if (result.qr_code_payload) {
    showQRModal(result.qr_code_payload, result.qr_share_url, result.status);
  }
  updateBotFromRefresh(result);
  if (result.status === 'confirmed') {
    closeQRModal();
    stopLoginPolling();
    toast('connected');
    return;
  }
  if (result.status === 'failed' || result.status === 'expired' || result.connection_status === 'error') {
    stopLoginPolling();
    toast(result.status);
    return;
  }
  loginPollTimer = setTimeout(() => pollLogin(bindingID), 2000);
}

function startLoginPolling(bindingID) {
  stopLoginPolling();
  activeBindingId = bindingID;
  loginPollTimer = setTimeout(() => pollLogin(bindingID), 2000);
}

function closeQRModal() {
  document.getElementById('qr-modal').classList.remove('active');
}

window.closeQRModal = closeQRModal;

async function connectSelectedBot() {
  if (!selectedBotId) {
    toast('select a bot');
    return;
  }
  const data = await api('POST', '/bots/connect', { bot_id: selectedBotId });
  if (data.code !== 'OK') {
    toast(data.message || data.code);
    return;
  }
  const result = data.data;
  activeBindingId = result.binding_id;
  document.getElementById('connect-result').innerHTML = '';
  if (result.qr_code_payload) {
    showQRModal(result.qr_code_payload, result.qr_share_url, result.status);
  }
  startLoginPolling(result.binding_id);
}

async function deleteBot(botID, botName) {
  const name = botName || botID;
  if (!confirm(`Delete bot "${name}"?`)) {
    return;
  }
  if (botID === selectedBotId) {
    stopLoginPolling();
    closeQRModal();
  }
  const data = await api('POST', '/bots/delete', { bot_id: botID });
  if (data.code !== 'OK') {
    toast(data.message || data.code);
    return;
  }
  toast('bot deleted');
  await loadBots();
}

async function copyShareURL() {
  const link = document.getElementById('qr-share-link').href;
  if (!link) {
    return;
  }
  await navigator.clipboard.writeText(link);
  toast('link copied');
}

function showQRModal(payload, shareURL, status) {
  const image = document.getElementById('qr-image');
  const shareBox = document.getElementById('qr-share-box');
  const shareLink = document.getElementById('qr-share-link');
  if (payload) {
    image.src = payload;
    image.style.display = 'block';
  } else {
    image.removeAttribute('src');
    image.style.display = 'none';
  }
  if (shareURL) {
    shareLink.href = shareURL;
    shareLink.textContent = shareURL;
    shareBox.style.display = 'block';
  } else {
    shareLink.removeAttribute('href');
    shareLink.textContent = '';
    shareBox.style.display = 'none';
  }
  document.getElementById('qr-status-text').textContent = status || 'qr_ready';
  document.getElementById('qr-modal').classList.add('active');
}

window.connectSelectedBot = connectSelectedBot;
window.showQRModal = showQRModal;
window.copyShareURL = copyShareURL;
window.loadBots = loadBots;
window.selectBot = selectBot;
window.createBot = createBot;
window.deleteBot = deleteBot;
window.closeQRModal = closeQRModal;

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function escapeJs(value) {
  return String(value ?? '')
    .replaceAll('\\', '\\\\')
    .replaceAll("'", "\\'");
}

loadAgentCapabilities().then(() => loadBots());

</script>
