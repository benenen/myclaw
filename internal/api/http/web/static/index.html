<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f3f4f8">
<title>myclaw Bots</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="brand-marker"></div>
      <div class="brand-text">
        <small>myclaw</small>
        <h1>Bots</h1>
      </div>
    </div>
    <div class="toolbar-group">
      <div class="user-pill" title="u_123" aria-label="Current user">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20 21a8 8 0 0 0-16 0"/>
          <circle cx="12" cy="8" r="4"/>
        </svg>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar panel">
      <div class="section-header">
        <div class="section-header-title">
          <h2>Bot List</h2>
          <span class="section-header-count" id="bot-count">(0)</span>
        </div>
        <div class="toolbar-group">
          <button class="icon-btn" onclick="loadBots()" title="Refresh" aria-label="Refresh">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 1 1-2.64-6.36"/>
              <path d="M21 3v6h-6"/>
            </svg>
          </button>
          <button class="icon-btn" onclick="openCreateBotModal()" title="New Bot" aria-label="New Bot">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 5v14"/><path d="M5 12h14"/>
            </svg>
          </button>
        </div>
      </div>

      <div id="bot-list" class="bot-list"></div>
      <div id="bot-empty" class="empty">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
        </div>
        <span class="empty-text">No bots</span>
      </div>
    </aside>

    <main class="workspace panel">
      <div id="workspace-empty" class="empty">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M20 21a8 8 0 0 0-16 0"/>
            <circle cx="12" cy="8" r="4"/>
          </svg>
        </div>
        <span class="empty-text">Select a bot</span>
      </div>

      <div id="workspace-detail" style="display:none;">
        <div class="card">
          <div class="card-header">
            <span class="card-title" id="detail-name">-</span>
            <span id="detail-status-badge"></span>
          </div>
          <div class="info-grid">
            <div class="info-cell">
              <span class="info-cell-label">Channel</span>
              <strong class="info-cell-value" id="detail-channel">-</strong>
            </div>
            <div class="info-cell">
              <span class="info-cell-label">Bot ID</span>
              <strong class="info-cell-value" id="detail-bot-id">-</strong>
            </div>
            <div class="info-cell">
              <span class="info-cell-label">Account</span>
              <strong class="info-cell-value" id="detail-account-id">-</strong>
            </div>
          </div>
        </div>

        <div class="card">
          <span class="card-subtitle">Agent</span>
          <div class="form-grid">
            <div class="form-field wide">
              <label>Capability</label>
              <select id="detail-agent-capability"></select>
            </div>
            <div class="form-field wide">
              <label>Mode</label>
              <select id="detail-agent-mode"></select>
            </div>
            <div class="form-field action">
              <button class="btn-secondary" onclick="saveSelectedBotAgent()">Save</button>
            </div>
          </div>
        </div>

        <div class="card">
          <span class="card-subtitle">Webhook</span>
          <div class="hook-url-row">
            <code class="hook-url-value" id="detail-hook-url">-</code>
            <button class="btn-secondary" onclick="copyHookUrl()">Copy</button>
          </div>
        </div>

        <div class="card">
          <span class="card-subtitle">Connect</span>
          <button class="btn-primary" onclick="connectSelectedBot()">Login / Connect</button>
          <div id="connect-result"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<div class="modal-overlay" id="create-bot-modal">
  <div class="modal">
    <h3 class="modal-heading">New Bot</h3>
    <p class="modal-desc">Create a new bot for your channel</p>
    <div class="form-grid">
      <div class="form-field wide">
        <label>Name</label>
        <input id="create-bot-name" type="text" placeholder="e.g. sales-bot">
      </div>
      <div class="form-field wide">
        <label>Channel</label>
        <select id="create-bot-channel">
          <option value="wechat">wechat</option>
        </select>
      </div>
      <div class="form-field wide">
        <label>Capability</label>
        <select id="create-bot-capability"></select>
      </div>
      <div class="form-field wide">
        <label>Mode</label>
        <select id="create-bot-mode"></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeCreateBotModal()">Close</button>
      <button class="btn-primary" onclick="createBot()">Create</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="qr-modal">
  <div class="modal">
    <h3 class="modal-heading">QR Login</h3>
    <p class="modal-desc" id="qr-status-text">Scan with WeChat</p>
    <div class="qr-box"><img id="qr-image" alt="WeChat QR code" style="display:none;"/></div>
    <div class="qr-box" id="qr-share-box" style="display:none;">
      <div class="kv-row"><span class="kv-label">share</span><strong><a id="qr-share-link" target="_blank" rel="noreferrer"></a></strong></div>
      <div class="modal-footer" style="justify-content:flex-start;margin-top:10px;">
        <button class="btn-secondary" onclick="copyShareURL()">Copy Link</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" onclick="closeQRModal()">Close</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
